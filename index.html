<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>污泥干化参数计算</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f0f4f8;
    color: #1a2332;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .container { max-width: 820px; width: 100%; }
  header { margin-bottom: 32px; }
  header h1 { font-size: 24px; font-weight: 700; color: #0b2b3b; letter-spacing: 0.5px; }
  header p { font-size: 14px; color: #5a6878; margin-top: 6px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 20px; overflow: hidden; }
  .card-header { padding: 16px 24px; border-bottom: 1px solid #edf0f4; font-size: 15px; font-weight: 600; color: #0b2b3b; display: flex; align-items: center; gap: 8px; }
  .card-body { padding: 20px 24px 24px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 13px; font-weight: 500; color: #3d4d5e; }
  .form-group select, .form-group input[type="number"] {
    height: 38px; border: 1px solid #d6dde6; border-radius: 6px; padding: 0 12px;
    font-size: 14px; color: #1a2332; background: #fff; transition: border-color .15s; outline: none;
  }
  .form-group select:focus, .form-group input:focus {
    border-color: #2b7a5e; box-shadow: 0 0 0 2px rgba(43,122,94,.12);
  }
  .form-group input[type="range"] {
    height: 6px; padding: 0; border: none; appearance: none;
    background: #d6dde6; border-radius: 3px; cursor: pointer; margin-top: 6px;
  }
  .form-group input[type="range"]::-webkit-slider-thumb {
    appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #2b7a5e; cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .range-row { display: flex; align-items: center; gap: 12px; }
  .range-row input[type="range"] { flex: 1; }
  .range-val { min-width: 52px; text-align: right; font-size: 15px; font-weight: 600; color: #2b7a5e; }
  .btn { height: 40px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; padding: 0 20px; transition: background .15s; }
  .btn-primary { background: #2b7a5e; color: #fff; }
  .btn-primary:hover { background: #22664e; }
  .btn-outline { background: transparent; color: #3d4d5e; border: 1px solid #d6dde6; }
  .btn-outline:hover { background: #f5f7fa; }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .result-item { background: #f7f9fc; border-radius: 6px; padding: 14px 12px; text-align: center; }
  .result-item .value { font-size: 20px; font-weight: 700; color: #0b2b3b; line-height: 1.3; }
  .result-item .unit { font-size: 13px; color: #7a8a9a; margin-top: 2px; }
  .result-item .label { font-size: 12px; color: #5a6878; margin-top: 6px; }
  .result-item.highlight .value { color: #2b7a5e; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; margin-top: 8px; }
  .tag-green { background: #e3f0ea; color: #1e6b4e; }
  .tag-blue { background: #e3ecf7; color: #1a5099; }
  .tag-amber { background: #fdf0dd; color: #8f6314; }
  @media (max-width: 640px) {
    body { padding: 16px 12px; }
    .form-grid { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: 1fr 1fr; }
    .card-body { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>污泥干化参数计算</h1>
  <p>输入污泥特性与干化目标，快速计算脱水指标与设备选型参考</p>
</header>

<div class="card">
  <div class="card-header"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2b7a5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M6 12H2M20 12h-4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M12 18v4"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>污泥特性</div>
  <div class="card-body">
    <div class="form-grid">
      <div class="form-group">
        <label for="sludgeType">污泥类型</label>
        <select id="sludgeType">
          <option value="municipal">市政污泥</option><option value="textile">印染污泥</option><option value="chemical">化工污泥</option>
          <option value="pharma">制药污泥</option><option value="paper">造纸污泥</option><option value="petro">石化污泥</option>
          <option value="food">食品加工污泥</option><option value="other">其他工业污泥</option>
        </select>
      </div>
      <div class="form-group">
        <label for="capacity">日处理量（吨/天）</label>
        <input type="number" id="capacity" value="10" min="0.5" step="0.5">
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2b7a5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>干化参数</div>
  <div class="card-body">
    <div class="form-grid full">
      <div class="form-group">
        <label>初始含水率</label>
        <div class="range-row"><input type="range" id="moistureIn" min="50" max="90" value="80" step="0.5"><span class="range-val" id="moistureInVal">80.0%</span></div>
      </div>
      <div class="form-group">
        <label>目标含水率</label>
        <div class="range-row"><input type="range" id="moistureOut" min="5" max="60" value="30" step="0.5"><span class="range-val" id="moistureOutVal">30.0%</span></div>
      </div>
    </div>
    <div class="form-grid" style="margin-top:16px">
      <div class="form-group">
        <label for="dryMethod">干化方式</label>
        <select id="dryMethod">
          <option value="heatpump">除湿热泵干化</option><option value="wasteheat">低温余热干化</option>
          <option value="hotair">直接热风干化</option><option value="steam">蒸汽干化</option><option value="solar">太阳能干化</option>
        </select>
      </div>
      <div class="form-group">
        <label for="heatSource">热源类型</label>
        <select id="heatSource">
          <option value="heatpump">热泵（电驱动）</option><option value="wasteheat">工业余热</option>
          <option value="naturalgas">天然气</option><option value="steam">蒸汽（0.5-1.0MPa）</option>
          <option value="solar">太阳能</option><option value="biogas">沼气/生物质</option>
        </select>
      </div>
      <div class="form-group">
        <label for="dryTemp">干化温度（℃）</label>
        <input type="number" id="dryTemp" value="75" min="20" max="250">
      </div>
      <div class="form-group">
        <label for="runningHours">日运行时长（小时）</label>
        <input type="number" id="runningHours" value="20" min="8" max="24">
      </div>
    </div>
  </div>
</div>

<div class="card" style="box-shadow:none;background:transparent">
  <div class="btn-row">
    <button class="btn btn-primary" onclick="calc()">计算参数</button>
    <button class="btn btn-outline" onclick="resetForm()">重置</button>
  </div>
</div>

<div class="card" id="resultCard">
  <div class="card-header"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2b7a5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>计算结果</div>
  <div class="card-body" id="resultBody">
    <div class="result-grid" id="resultGrid">
      <div class="result-item highlight"><div class="value" id="rWaterEvap">—</div><div class="unit">吨/天</div><div class="label">脱水量</div></div>
      <div class="result-item highlight"><div class="value" id="rDryOutput">—</div><div class="unit">吨/天</div><div class="label">干泥产量</div></div>
      <div class="result-item"><div class="value" id="rReduction">—</div><div class="unit">%</div><div class="label">减量率</div></div>
      <div class="result-item"><div class="value" id="rEvapRate">—</div><div class="unit">kg水/小时</div><div class="label">脱水速率</div></div>
      <div class="result-item"><div class="value" id="rEnergyCons">—</div><div class="unit">kWh/吨水</div><div class="label">能耗（去水）</div></div>
      <div class="result-item"><div class="value" id="rDailyEnergy">—</div><div class="unit">kWh/天</div><div class="label">日能耗</div></div>
      <div class="result-item"><div class="value" id="rDryMatter">—</div><div class="unit">吨DS/天</div><div class="label">干固体量</div></div>
      <div class="result-item"><div class="value" id="rEquipmentRef">—</div><div class="unit" style="font-size:11px">选型参考</div><div class="label" id="rEquipLabel">推荐设备</div></div>
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid #edf0f4;display:flex;flex-wrap:wrap;gap:8px;" id="tagRow"></div>
  </div>
</div>

<footer style="text-align:center;margin-top:12px;font-size:12px;color:#9aabbb">德尔科机电 · 污泥干化快速估算 &nbsp;|&nbsp; 仅供参考，实际以工程核算为准</footer>

</div>

<script>
const moistureInEl = document.getElementById('moistureIn');
const moistureOutEl = document.getElementById('moistureOut');
const moistureInVal = document.getElementById('moistureInVal');
const moistureOutVal = document.getElementById('moistureOutVal');
moistureInEl.addEventListener('input', () => { moistureInVal.textContent = parseFloat(moistureInEl.value).toFixed(1) + '%'; });
moistureOutEl.addEventListener('input', () => { moistureOutVal.textContent = parseFloat(moistureOutEl.value).toFixed(1) + '%'; });

const ENERGY_MAP = { heatpump: 280, wasteheat: 120, hotair: 380, steam: 220, solar: 150 };
const TYPE_NOTES = { municipal: '市政污泥粘性适中，推荐配破拱切条机', textile: '印染污泥纤维含量高，注意防缠绕', chemical: '化工污泥成分复杂，需防腐设计', pharma: '制药污泥需关注生物安全性', paper: '造纸污泥纤维多，脱水性较好', petro: '石化污泥含油，需防爆设计', food: '食品污泥有机质高，注意除臭', other: '建议先做小试验证' };
const TYPE_CN = { municipal: '市政', textile: '印染', chemical: '化工', pharma: '制药', paper: '造纸', petro: '石化', food: '食品', other: '工业' };
const METHOD_CN = { heatpump: '除湿热泵', wasteheat: '余热利用', hotair: '直接热风', steam: '蒸汽干化', solar: '太阳能' };

function calc() {
  const mIn = parseFloat(moistureInEl.value) / 100;
  const mOut = parseFloat(moistureOutEl.value) / 100;
  const Q = parseFloat(document.getElementById('capacity').value) || 10;
  const hours = parseFloat(document.getElementById('runningHours').value) || 20;
  const type = document.getElementById('sludgeType').value;
  const method = document.getElementById('dryMethod').value;
  const temp = parseFloat(document.getElementById('dryTemp').value) || 75;
  if (mOut >= mIn) { alert('目标含水率必须低于初始含水率！'); return; }

  const DS = Q * (1 - mIn);
  const M_dry = DS / (1 - mOut);
  const W = Q - M_dry;
  const R = (W / Q) * 100;
  const rate = (W * 1000) / hours;
  const ePerTon = ENERGY_MAP[method] || 280;
  const dailyEnergy = W * ePerTon;

  let equip = '', tag = '', tagClass = '';
  if (temp <= 60) { equip = '超低温型干化机'; tag = '超低温工况'; tagClass = 'tag-blue'; }
  else if (temp <= 85) {
    if (method === 'heatpump') { equip = '除湿热泵干化机'; tag = '标准热泵工况'; tagClass = 'tag-green'; }
    else { equip = '低温余热干化机'; tag = '余热利用推荐'; tagClass = 'tag-green'; }
  } else if (temp <= 150) { equip = '中温干化机'; tag = '中温段'; tagClass = 'tag-amber'; }
  else { equip = '高温干化机'; tag = '高温工况'; tagClass = 'tag-amber'; }

  document.getElementById('rWaterEvap').textContent = W.toFixed(2);
  document.getElementById('rDryOutput').textContent = M_dry.toFixed(2);
  document.getElementById('rReduction').textContent = R.toFixed(1);
  document.getElementById('rEvapRate').textContent = rate.toFixed(0);
  document.getElementById('rEnergyCons').textContent = ePerTon;
  document.getElementById('rDailyEnergy').textContent = dailyEnergy.toFixed(0);
  document.getElementById('rDryMatter').textContent = DS.toFixed(2);
  document.getElementById('rEquipmentRef').textContent = equip;
  document.getElementById('rEquipLabel').textContent = TYPE_NOTES[type] || '';

  const tagRow = document.getElementById('tagRow');
  tagRow.innerHTML = '';
  [tagClass, tag, temp + '℃'].forEach((c, i) => { if (i === 0) return; });
  const t1 = document.createElement('span'); t1.className = 'tag ' + tagClass; t1.textContent = tag + ' · ' + temp + '℃'; tagRow.appendChild(t1);
  const t2 = document.createElement('span'); t2.className = 'tag tag-blue'; t2.textContent = METHOD_CN[method] || '干化'; tagRow.appendChild(t2);
  const t3 = document.createElement('span'); t3.className = 'tag'; t3.style.cssText = 'background:#f0f0f5;color:#555'; t3.textContent = TYPE_CN[type] + '污泥'; tagRow.appendChild(t3);
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetForm() {
  document.getElementById('sludgeType').value = 'municipal'; document.getElementById('capacity').value = 10;
  moistureInEl.value = 80; moistureInVal.textContent = '80.0%';
  moistureOutEl.value = 30; moistureOutVal.textContent = '30.0%';
  document.getElementById('dryMethod').value = 'heatpump'; document.getElementById('heatSource').value = 'heatpump';
  document.getElementById('dryTemp').value = 75; document.getElementById('runningHours').value = 20;
  calc();
}
calc();
</script>
</body>
</html>
